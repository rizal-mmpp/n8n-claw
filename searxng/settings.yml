use_default_settings: true

server:
  bind_address: "0.0.0.0"
  port: 8080
  secret_key: "{{SEARXNG_SECRET_KEY}}"

search:
  formats:
    - html
    - json
  default_lang: "de"

engines:
  - name: google
    engine: google
    disabled: false
  - name: duckduckgo
    engine: duckduckgo
    disabled: false
  - name: brave
    engine: brave
    disabled: false
  - name: wikipedia
    engine: wikipedia
    disabled: false
